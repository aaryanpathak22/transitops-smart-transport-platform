services:
  postgres:
    image: postgres:16
    container_name: transitops-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: transitops
      POSTGRES_PASSWORD: transitops123
      POSTGRES_DB: transitops

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: